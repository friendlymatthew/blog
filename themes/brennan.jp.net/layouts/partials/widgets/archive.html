<div class="widget widget-archive">
  <div class="widget-header widget-header-archive">📅 Archive</div>
  <div class="widget-content widget-scrollable">
    <ul class="archive-list">
      {{ $pages := where .Site.RegularPages "Section" "posts" }}
      {{ $grouped := $pages.GroupByDate "January 2006" }}
      {{ range $grouped }}
      <li class="archive-month">
        <details>
          <summary>
            <span class="archive-date">📅 {{ .Key }}</span>
            <span class="archive-count">({{ len .Pages }})</span>
          </summary>
          <ul class="archive-posts">
            {{ range .Pages }}
            <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
            {{ end }}
          </ul>
        </details>
      </li>
      {{ end }}
    </ul>
  </div>
</div>
