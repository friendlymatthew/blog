[[params.quotes]]
text = "I was once trapped on a desert island and to be honest, the five albums I brought didn't help a goddamn thing."
author = "Norm Macdonald Live"
[[params.quotes]]
text = "I don't want fancy things. Or fancy-shmancy things. I don't even want fancy-shmancy-wancy things or fancy-shmancy-take-a-trip-to-Francey things!<br><br>What I want is wasting your time and mine."
author = "Norm Macdonald Live"
[[params.quotes]]
text = "Wearing glasses doesn't always make you look smarter. For example, you must wear them on your face."
