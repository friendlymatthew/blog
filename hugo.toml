baseURL = "https://chunkofcoal.com"
languageCode = "en-us"
title = "chunkofcoal.com"
theme = "brennan.jp.net"

[pagination]
pagerSize = 15
summaryLength = 70

[taxonomies]
category = "categories"
tag = "tags"

[menus]
[[menus.main]]
name = "Home"
url = "/"
weight = 1
[[menus.main]]
name = "About"
url = "/about/"
weight = 3

[params]
description = "https://github.com/friendlymatthew"
author = "friendlymatthew"
featured_image = "/images/me.jpg"

# SEO
noIndex = false
robots = "index, follow"
github = "friendlymatthew"

# Color scheme
primaryColor = "#FF0000"
secondaryColor = "#0066FF"
backgroundColor = "#FFFFFF"
borderColor = "#CCCCCC"
textSecondaryColor = "#666666"
textMutedColor = "#999999"
backgroundSecondaryColor = "#F0F0F0"

# Layout options
showSidebar = true
sidebarPosition = "right"
columnCount = 3

# Homepage settings
postsPerPage = 15
excerptLength = 300
showThumbnails = true

# Visual effects
enableAnimations = true
showHitCounter = true
enableMarquee = false

# Widgets
showRecentPosts = true
recentPostsCount = 10
showTagCloud = true
showArchiveCalendar = true
showRandomQuote = true

# Footer
[[params.quotes]]
text = "I wouldn't call myself a fan of 'steampunk', but I will say it's the healthiest way to prepare punk."
author = "Norm Macdonald Live"
[[params.quotes]]
text = "Every day I try to expand my vocabulary by using new words to give my arguments more verisimilitude. Today's word is 'expand'."
