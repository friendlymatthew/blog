text = "I think there's nothing cooler than being a lone wolf. Except at wolf-picnics when you don't have a partner for the wolf-wheelbarrow races."
author = "Norm Macdonald Live"
[[params.quotes]]
text = "A Florida man was arrested for stealing a truck filled with $76,000 worth of Campbell's soup. I, for one, hope this guy goes away for 'Mmm, mmm, good!'"
author = "Norm Macdonald Live"
[[params.quotes]]
text = "Accomplished comedian Sinbad announced he's filing for bankruptcy for the 2nd time. Sounds like things have gone from Sinbad to Sinworse."
author = "Norm Macdonald Live"
[[params.quotes]]
text = "A tractor-trailer flipped over releasing millions of bees, which stung the driver hundreds of times. Speaking from the hospital, the driver said: \"No flowers?\""
author = "Norm Macdonald Live"
[[params.quotes]]
text = "When Mozart would sit down to compose a new piano concerto, he would first pause, close his eyes, and say to himself, \"I'd better make this hard as fuck to play.\""
author = "Norm Macdonald Live"
[[params.quotes]]
text = "If I could add one president to Mt. Rushmore it would be James Polk, because I'm interested to know what he looked like."
author = "Norm Macdonald Live"
